<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WebRTC智能监控</title>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>


    <style>
        *{
        box-sizing:border-box;
        }
        
        
        body{
        
        margin:0;
        padding:20px;
        background:#121212;
        color:white;
        font-family:sans-serif;
        
        display:flex;
        justify-content:center;
        
        }
        
        
        
        .card{
        
        width:100%;
        max-width:420px;
        
        background:#1e1e1e;
        
        padding:20px;
        
        border-radius:15px;
        
        }
        
        
        
        h2{
        
        text-align:center;
        
        }
        
        
        
        input,
        select,
        button{
        
        width:100%;
        padding:12px;
        margin:8px 0;
        
        border:0;
        border-radius:8px;
        
        font-size:16px;
        
        }
        
        
        
        button{
        
        background:#007bff;
        color:white;
        font-weight:bold;
        
        }
        
        
        
        .status{
        
        background:#292929;
        
        padding:10px;
        
        border-radius:8px;
        
        text-align:center;
        
        color:#ffeb3b;
        
        }
        
        
        
        .debug{
        
        margin-top:10px;
        
        background:#000;
        
        color:#00ff88;
        
        padding:10px;
        
        border-radius:8px;
        
        font-size:12px;
        
        white-space:pre-line;
        
        }
        
        
        
        video{
        
        width:100%;
        
        background:#000;
        
        border-radius:10px;
        
        margin-top:10px;
        
        }
        
        
        
        .hidden{
        
        display:none;
        
        }
        
        
        
        .red{
        
        background:#d32f2f;
        
        }
        
    </style>


</head>



<body>



    <div class="card" id="setup">


        <h2>
            📡 智能监控
        </h2>


        <div class="status" id="status">

            等待进入

        </div>



        <input id="room" type="number" value="123" placeholder="房间号">



        <select id="role">


            <option value="camera">

                📷 摄像头

            </option>


            <option value="viewer">

                📺 查看器

            </option>


        </select>



        <button onclick="start()">

            进入房间

        </button>



    </div>





    <div class="card hidden" id="main">


        <div class="status" id="live">

            连接中...

        </div>



        <video id="video" autoplay playsinline>

        </video>



        <button id="micBtn" onclick="toggleMic()">

            麦克风：开启

        </button>



        <button onclick="location.reload()">

            退出

        </button>



        <div class="debug" id="debug">

            调试信息

        </div>



    </div>





    <script>
        let peer=null;
        
        let localStream=null;
        
        let currentCall=null;
        
        let micEnabled=true;
        
        
        const live=
        document.getElementById("live");
        
        
        const video=
        document.getElementById("video");
        
        
        const debug=
        document.getElementById("debug");
        
        
        
        function log(t){
        
        console.log(t);
        
        debug.innerHTML +=
        "\n"+t;
        
        }
        
        
        
        
        
        const peerConfig={
        
        
        iceServers:[
        
        
        {
        urls:
        "stun:stun.l.google.com:19302"
        },
        
        
        {
        urls:
        "stun:stun1.l.google.com:19302"
        },
        
        
        {
        urls:
        "stun:stun2.l.google.com:19302"
        },
        
        
        {
        urls:
        "stun:stun3.l.google.com:19302"
        }
        
        
        ]
        
        
        };
        
        
        
        
        
        
        function start(){
        
        
        let room =
        document.getElementById("room").value;
        
        
        let role =
        document.getElementById("role").value;
        
        
        
        if(!room){
        
        alert("请输入房间号");
        
        return;
        
        }
        
        
        
        document
        .getElementById("setup")
        .classList.add("hidden");
        
        
        
        document
        .getElementById("main")
        .classList.remove("hidden");
        
        
        
        
        let id;
        
        
        
        if(role==="camera"){
        
        
        id =
        "camera-"+room;
        
        
        }else{
        
        
        id =
        "viewer-"+room+"-"+Date.now();
        
        
        }
        
        
        
        
        
        peer =
        new Peer(
        id,
        {
        config:peerConfig,
        debug:3
        }
        );
        
        
        
        
        
        peer.on(
        "open",
        id=>{
        
        
        log(
        "Peer ID: "+id
        );
        
        
        
        live.innerHTML=
        "Peer连接成功";
        
        
        
        if(role==="camera"){
        
        startCamera();
        
        
        }else{
        
        startViewer(room);
        
        }
        
        
        
        });
        
        
        
        
        
        peer.on(
        "error",
        e=>{
        
        
        log(
        "Peer错误: "+e.type
        );
        
        
        live.innerHTML=
        "错误: "+e.type;
        
        
        });
        
        
        
        }
          // ===============================
        // 摄像头端
        // ===============================
        
        async function startCamera(){
        
        
            live.innerHTML =
            "正在开启摄像头...";
        
        
            try{
        
        
                localStream =
                await navigator.mediaDevices.getUserMedia({
        
                    // 不指定 facingMode
                    // 避免部分手机没有返回video track
        
                    video:{
                        width:{
                            ideal:1280
                        },
                        height:{
                            ideal:720
                        },
                        frameRate:{
                            ideal:30
                        }
                    },
        
                    audio:true
        
                });
        
        
        
                video.srcObject =
                localStream;
        
        
                video.muted=true;
        
        
        
                let videos =
                localStream.getVideoTracks();
        
        
                let audios =
                localStream.getAudioTracks();
        
        
        
                log(
                "摄像头启动成功"
                );
        
        
                log(
                "Video tracks: "
                + videos.length
                );
        
        
                log(
                "Audio tracks: "
                + audios.length
                );
        
        
        
                if(videos.length===0){
        
                    log(
                    "警告: 没有视频轨道"
                    );
        
                }
        
        
        
                live.innerHTML =
                "📷 等待查看器";
        
        
        
        
        
                peer.on(
                "call",
                call=>{
        
        
                    log(
                    "收到查看器呼叫"
                    );
        
        
        
                    if(currentCall){
        
                        log(
                        "已有连接"
                        );
        
                        return;
        
                    }
        
        
        
                    currentCall =
                    call;
        
        
        
                    // 确保发送video + audio
        
                    let sendStream =
                    new MediaStream();
        
        
        
                    localStream
                    .getTracks()
                    .forEach(track=>{
        
                        sendStream.addTrack(track);
        
                    });
        
        
        
                    log(
                    "发送轨道:"
                    );
        
        
                    sendStream
                    .getTracks()
                    .forEach(track=>{
        
                        log(
                        track.kind+
                        " "+
                        track.readyState
                        );
        
                    });
        
        
        
                    call.answer(
                        sendStream
                    );
        
        
        
                    live.innerHTML =
                    "📺 查看器已连接";
        
        
        
        
                    monitorConnection(call);
        
        
        
                    call.on(
                    "close",
                    ()=>{
        
        
                        log(
                        "Call关闭"
                        );
        
        
                        currentCall=null;
        
        
                    });
        
        
        
                });
        
        
        
            }
            catch(e){
        
        
                log(
                "摄像头错误: "
                +e.message
                );
        
        
                live.innerHTML =
                "摄像头开启失败";
        
        
            }
        
        
        
        }
        
        
        
        
        
        
        
        
        // ===============================
        // 查看器端
        // ===============================
        
        
        function startViewer(room){
        
        
        
            let cameraID =
            "camera-"+room;
        
        
        
            live.innerHTML =
            "寻找摄像头...";
        
        
        
        
            function connectCamera(){
        
        
        
                log(
                "呼叫:"
                +cameraID
                );
        
        
        
                // 创建真正的发送流
                // 避免空stream导致协商异常
        
        
                let viewerStream =
                new MediaStream();
        
        
        
        
                let call;
        
        
        
                try{
        
        
                    call =
                    peer.call(
                        cameraID,
                        viewerStream
                    );
        
        
                }
                catch(e){
        
        
                    log(
                    "呼叫错误:"
                    +e.message
                    );
        
        
                    return;
        
                }
        
        
        
        
                if(!call){
        
        
                    log(
                    "摄像头不存在"
                    );
        
        
                    return;
        
                }
        
        
        
                currentCall =
                call;
        
        
        
        
                monitorConnection(call);
        
        
        
        
        
                call.on(
                "stream",
                remoteStream=>{
        
        
                    log(
                    "收到远程流"
                    );
        
        
        
                    let tracks =
                    remoteStream
                    .getVideoTracks();
        
        
        
                    log(
                    "远程Video tracks:"
                    +tracks.length
                    );
        
        
        
                    if(tracks.length>0){
        
        
                        video.srcObject =
                        remoteStream;
        
        
        
                        video.play()
                        .catch(e=>{
        
                            log(
                            "播放失败:"
                            +e.message
                            );
        
                        });
        
        
        
                        live.innerHTML =
                        "✅ 视频成功";
        
        
                    }
                    else{
        
        
                        log(
                        "远程没有video track"
                        );
        
        
                    }
        
        
        
                });
        
        
        
        
        
                call.on(
                "close",
                ()=>{
        
        
                    log(
                    "视频关闭"
                    );
        
        
                    currentCall=null;
        
        
        
                    setTimeout(
                        connectCamera,
                        3000
                    );
        
        
                });
        
        
        
            }
        
        
        
        
        
            connectCamera();
        
        
        
        }
          // ===============================
        // WebRTC连接状态监控
        // ===============================
        
        function monitorConnection(call){
        
        
            if(!call.peerConnection){
        
                log(
                "没有PeerConnection"
                );
        
                return;
        
            }
        
        
        
            let pc =
            call.peerConnection;
        
        
        
        
            pc.oniceconnectionstatechange =
            ()=>{
        
        
                log(
                "ICE状态: "
                +pc.iceConnectionState
                );
        
        
            };
        
        
        
            pc.onconnectionstatechange =
            ()=>{
        
        
                log(
                "连接状态: "
                +pc.connectionState
                );
        
        
                if(
                pc.connectionState==="connected"
                ){
        
                    live.innerHTML=
                    "WebRTC已连接";
        
                }
        
        
        
                if(
                pc.connectionState==="failed"
                ){
        
                    live.innerHTML=
                    "连接失败";
        
        
                }
        
        
        
            };
        
        
        
        
            pc.onicegatheringstatechange =
            ()=>{
        
        
                log(
                "ICE收集: "
                +pc.iceGatheringState
                );
        
        
            };
        
        
        
        }
        
        
        
        
        
        
        // ===============================
        // 麦克风开关
        // ===============================
        
        
        function toggleMic(){
        
        
        
            if(!localStream){
        
        
                log(
                "没有本地音频"
                );
        
        
                return;
        
        
            }
        
        
        
        
            micEnabled =
            !micEnabled;
        
        
        
        
            localStream
            .getAudioTracks()
            .forEach(track=>{
        
        
                track.enabled =
                micEnabled;
        
        
            });
        
        
        
        
            let btn =
            document.getElementById("micBtn");
        
        
        
            if(micEnabled){
        
        
                btn.innerHTML =
                "麦克风：开启";
        
        
                btn.classList.remove("red");
        
        
                log(
                "麦克风开启"
                );
        
        
            }
            else{
        
        
                btn.innerHTML =
                "麦克风：关闭";
        
        
                btn.classList.add("red");
        
        
                log(
                "麦克风关闭"
                );
        
        
            }
        
        
        }
        
        
        
        
        
        
        
        
        // ===============================
        // Peer自动恢复
        // ===============================
        
        
        setInterval(()=>{
        
        
            if(
            peer &&
            peer.disconnected
            ){
        
        
                log(
                "Peer断开，重新连接"
                );
        
        
                peer.reconnect();
        
        
            }
        
        
        
        },5000);
        
        
        
        
        
        
        
        // ===============================
        // 网络状态
        // ===============================
        
        
        window.addEventListener(
        "online",
        ()=>{
        
        
            log(
            "网络恢复"
            );
        
        
        });
        
        
        
        window.addEventListener(
        "offline",
        ()=>{
        
        
            log(
            "网络断开"
            );
        
        
            live.innerHTML =
            "⚠️ 网络断开";
        
        
        });
        
        
        
        
        
        
        
        // ===============================
        // 页面关闭清理
        // ===============================
        
        
        window.addEventListener(
        "beforeunload",
        ()=>{
        
        
            if(localStream){
        
        
                localStream
                .getTracks()
                .forEach(track=>{
        
        
                    track.stop();
        
        
                });
        
        
            }
        
        
        
        
            if(currentCall){
        
        
                currentCall.close();
        
        
            }
        
        
        
        
            if(peer){
        
        
                peer.destroy();
        
        
            }
        
        
        
        });
        
        
        
        
        
        
        
        // ===============================
        // 视频轨道检测
        // ===============================
        
        
        setInterval(()=>{
        
        
            if(video.srcObject){
        
        
                let tracks =
                video.srcObject
                .getVideoTracks();
        
        
        
                log(
                "当前视频轨道:"
                +tracks.length
                );
        
        
            }
        
        
        
        },10000);
        
        
        
    </script>


</body>

</html>
