<!DOCTYPE html>
<html>

<head>
    <title>🍳 Kitchen System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
          font-family: Arial;
          background: #111;
          color: white;
          padding: 20px;
        }
        
        h2 {
          text-align: center;
        }
        
        button {
          width: 100%;
          padding: 15px;
          font-size: 18px;
          margin-bottom: 20px;
          background: #00ff88;
          border: none;
          border-radius: 10px;
          cursor: pointer;
        }
        
        .order {
          background: #222;
          padding: 15px;
          margin: 10px 0;
          border-radius: 10px;
          border-left: 5px solid #00ff88;
        }
        
        .time {
          font-size: 12px;
          opacity: 0.6;
        }
    </style>
</head>

<body>

    <h2>🍳 Kitchen Display</h2>

    <!-- 🟢 必须启动按钮 -->
    <button onclick="startSystem()">▶ Start Kitchen System</button>

    <div id="orders"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        // 🔑 Firebase config
        const firebaseConfig = {
          apiKey: "AIzaSyBNk0S-ArNKrK_fmUZJb6K2U2252rT5FNU",
          authDomain: "restaurant-app-bc3c1.firebaseapp.com",
          projectId: "restaurant-app-bc3c1",
          storageBucket: "restaurant-app-bc3c1.firebasestorage.app",
          messagingSenderId: "25868708085",
          appId: "1:25868708085:web:5585774b7ede6ecd127dbc"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const ordersDiv = document.getElementById("orders");
        
        let started = false;
        
        // 🟢 启动系统（必须用户点击）
        window.startSystem = function () {
          Notification.requestPermission().then(result => {
            alert("Notification: " + result);
          });
        
          started = true;
          alert("🍳 Kitchen system started!");
        };
        
        // 🔥 Firebase 监听
        const q = query(collection(db, "orders"));
        
        onSnapshot(q, (snapshot) => {
        
          if (!started) return;
        
          snapshot.docChanges().forEach(change => {
        
            if (change.type === "added") {
        
              const data = change.doc.data();
        
              // 🍳 显示订单
              const div = document.createElement("div");
              div.className = "order";
        
              div.innerHTML = `
                🪑 Table: ${data.table}<br>
                🍔 Item: ${data.item}<br>
                🔢 Qty: ${data.qty}<br>
                <div class="time">${new Date(data.time).toLocaleTimeString()}</div>
              `;
        
              ordersDiv.prepend(div);
        
              // 🔔 系统通知
              if (Notification.permission === "granted") {
                new Notification("🍔 New Order", {
                  body: `Table ${data.table} - ${data.item} x${data.qty}`
                });
              }
        
              // 🔊 声音
              new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
            }
          });
        
        });
        
    </script>

</body>

</html>
