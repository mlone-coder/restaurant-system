<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零服务器监控</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 400px; margin: 0 auto; }
        input, select, button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #00c853; color: white; font-weight: bold; cursor: pointer; }
        video { width: 100%; max-width: 500px; background: #000; border-radius: 10px; margin-top: 20px; }
        #status { color: #ffeb3b; margin: 10px 0; font-size: 14px; }
    </style>
</head>

<body>

    <div class="card">
        <h2>简易监控 (P2P版)</h2>
        <input type="text" id="roomInput" placeholder="输入房间号 (如: 666)" value="666">
        <select id="roleInput">
            <option value="camera">我是：摄像头 (旧手机)</option>
            <option value="tv">我是：电视机 (看画面)</option>
        </select>
        <button id="startBtn">启动</button>
        <div id="status">未连接</div>
    </div>

    <video id="displayVideo" autoplay playsinline muted></video>

    <script>
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const videoElem = document.getElementById('displayVideo');
        let peer = null;
        
        startBtn.onclick = () => {
            const roomId = document.getElementById('roomInput').value;
            const role = document.getElementById('roleInput').value;
            
            if (!roomId) return alert("请输入房间号");
        
            // 1. 初始化 Peer (使用公共服务器)
            // 摄像头的 ID 是固定格式，方便电视机端寻找
            const myId = role === 'camera' ? `room-${roomId}-cam` : `room-${roomId}-tv-${Math.floor(Math.random()*1000)}`;
            peer = new Peer(myId);
        
            statusDiv.innerText = "正在初始化网络...";
        
            peer.on('open', (id) => {
                statusDiv.innerText = `在线！ID: ${id}`;
                if (role === 'camera') {
                    startCamera(roomId);
                } else {
                    startTV(roomId);
                }
            });
        
            peer.on('error', (err) => {
                console.error(err);
                statusDiv.innerText = "错误: " + err.type;
                if(err.type === 'unavailable-id') alert("该房间已有摄像头！请换个房间号");
            });
        };
        
        // --- 摄像头端逻辑 ---
        async function startCamera(roomId) {
            try {
                // 获取摄像头流
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                videoElem.srcObject = stream;
                statusDiv.innerText = "摄像头就绪，等待电视机连接...";
        
                // 监听呼叫
                peer.on('call', (call) => {
                    statusDiv.innerText = "电视机已连接！正在传输...";
                    call.answer(stream); // 响应流
                });
            } catch (e) {
                statusDiv.innerText = "无法打开摄像头: " + e.message;
            }
        }
        
        // --- 电视机端逻辑 ---
        function startTV(roomId) {
            const targetId = `room-${roomId}-cam`;
            statusDiv.innerText = `正在寻找摄像头: ${targetId}...`;
        
            // 尝试呼叫摄像头 (即使摄像头还没上线，PeerJS也会尝试)
            // 我们用一个空的音频流来触发呼叫
            const dummyStream = new AudioContext().createMediaStreamDestination().stream;
            const call = peer.call(targetId, dummyStream);
        
            call.on('stream', (remoteStream) => {
                statusDiv.innerText = "连接成功！收到画面";
                videoElem.srcObject = remoteStream;
                videoElem.muted = false; // 允许声音
            });
        
            // 自动重试机制
            setTimeout(() => {
                if (videoElem.srcObject == null) {
                    statusDiv.innerText = "未找到摄像头，请确保摄像头已启动并刷新重试";
                }
            }, 5000);
        }
    </script>
</body>

</html>
