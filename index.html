<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>智能监控 STUN稳定版</title>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        *{
            box-sizing:border-box;
        }
        
        body{
            margin:0;
            padding:20px;
            background:#121212;
            color:white;
            font-family:sans-serif;
            display:flex;
            justify-content:center;
        }
        
        .card{
            width:100%;
            max-width:420px;
            background:#1e1e1e;
            padding:20px;
            border-radius:15px;
        }
        
        h2{
            text-align:center;
        }
        
        input,select,button{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:0;
            border-radius:8px;
            font-size:16px;
        }
        
        button{
            background:#007bff;
            color:white;
            font-weight:bold;
        }
        
        button:active{
            transform:scale(.98);
        }
        
        .status{
            background:#2b2b2b;
            padding:10px;
            border-radius:8px;
            color:#ffeb3b;
            text-align:center;
            font-size:14px;
        }
        
        video{
            width:100%;
            background:black;
            border-radius:10px;
            margin-top:10px;
        }
        
        .hidden{
            display:none;
        }
        
        .red{
            background:#d32f2f!important;
        }
    </style>

</head>

<body>


    <div class="card" id="setup">

        <h2>智能监控</h2>

        <div class="status" id="status">
            等待开始
        </div>

        <input id="room" type="number" value="123" placeholder="房间号码">


        <select id="role">

            <option value="camera">
                📷 摄像头
            </option>

            <option value="viewer">
                📺 查看器
            </option>

        </select>


        <button onclick="start()">
            进入房间
        </button>


    </div>



    <div class="card hidden" id="monitor">


        <div class="status" id="live">
            正在连接...
        </div>


        <video id="video" autoplay playsinline>
        </video>


        <button id="mic" onclick="toggleMic()">
            麦克风: 开启
        </button>


        <button onclick="location.reload()">
            退出
        </button>


    </div>



    <script>
        let peer;
        let localStream=null;
        let currentCall=null;
        
        let mic=true;
        
        const status=document.getElementById("status");
        const live=document.getElementById("live");
        const video=document.getElementById("video");
        
        
        // STUN服务器
        const rtcConfig={
        
        iceServers:[
        
        {
        urls:
        "stun:stun.l.google.com:19302"
        },
        
        {
        urls:
        "stun:stun1.l.google.com:19302"
        },
        
        {
        urls:
        "stun:stun2.l.google.com:19302"
        },
        
        {
        urls:
        "stun:stun3.l.google.com:19302"
        }
        
        ]
        
        };
        
        
        
        function start(){
        
        let room=
        document.getElementById("room").value;
        
        
        let role=
        document.getElementById("role").value;
        
        
        if(!room){
        alert("请输入房间号");
        return;
        }
        
        
        document.getElementById("setup")
        .classList.add("hidden");
        
        
        document.getElementById("monitor")
        .classList.remove("hidden");
        
        
        
        let id;
        
        
        if(role==="camera"){
        
        id="camera-"+room;
        
        }else{
        
        id=
        "viewer-"+room+"-"+Math.floor(Math.random()*9999);
        
        }
        
        
        
        peer=new Peer(
        id,
        {
        config:rtcConfig,
        debug:2
        }
        );
        
        
        
        peer.on(
        "open",
        ()=>{
        
        live.innerHTML=
        "已连接服务器";
        
        
        
        if(role==="camera"){
        
        startCamera();
        
        }else{
        
        startViewer(room);
        
        }
        
        
        });
        
        
        
        peer.on(
        "error",
        e=>{
        
        console.log(e);
        
        
        live.innerHTML=
        "错误："+e.type;
        
        
        }
        
        );
        
        
        }
        // ==============================
        // 摄像头端
        // ==============================
        
        async function startCamera(){
        
            live.innerHTML="正在请求摄像头权限...";
        
            try{
        
                localStream =
                await navigator.mediaDevices.getUserMedia({
        
                    video:{
                        facingMode:"environment",
                        width:{
                            ideal:1280
                        },
                        height:{
                            ideal:720
                        }
                    },
        
                    audio:true
        
                });
        
        
        
                video.srcObject=localStream;
        
                video.muted=true;
        
        
                live.innerHTML=
                "📷 摄像头运行中，等待连接";
        
        
        
                peer.on(
                "call",
                call=>{
        
        
                    // 防止重复连接
                    if(currentCall){
                        return;
                    }
        
        
                    currentCall=call;
        
        
                    live.innerHTML=
                    "📺 查看器已连接";
        
        
                    call.answer(localStream);
        
        
        
                    call.on(
                    "close",
                    ()=>{
        
                        currentCall=null;
        
                        live.innerHTML=
                        "等待重新连接";
        
                    });
        
        
        
                });
        
        
        
            }catch(e){
        
                console.log(e);
        
        
                live.innerHTML=
                "无法打开摄像头";
        
        
                alert(
                "请允许摄像头权限，并使用HTTPS访问"
                );
        
            }
        
        }
        
        
        
        
        // ==============================
        // 查看器端
        // ==============================
        
        
        function startViewer(room){
        
        
            let cameraID=
            "camera-"+room;
        
        
        
            live.innerHTML=
            "正在寻找摄像头...";
        
        
        
            function connect(){
        
        
                console.log(
                "连接:",
                cameraID
                );
        
        
        
                let call;
        
        
                try{
        
        
                    call=
                    peer.call(
                        cameraID,
                        new MediaStream()
                    );
        
        
        
                }catch(e){
        
                    return;
        
                }
        
        
        
        
                if(!call){
        
                    return;
        
                }
        
        
        
                currentCall=call;
        
        
        
                call.on(
                "stream",
                stream=>{
        
        
                    live.innerHTML=
                    "✅ 连接成功";
        
        
                    video.srcObject=
                    stream;
        
        
                    video.play();
        
        
                });
        
        
        
                call.on(
                "close",
                ()=>{
        
        
                    live.innerHTML=
                    "连接断开，重新寻找";
        
        
                    currentCall=null;
        
        
                    setTimeout(
                        connect,
                        3000
                    );
        
        
                });
        
        
        
                call.on(
                "error",
                ()=>{
        
        
                    currentCall=null;
        
        
                    setTimeout(
                        connect,
                        3000
                    );
        
        
                });
        
        
        
            }
        
        
        
            connect();
        
        
        
            // 定时检查
            setInterval(()=>{
        
        
                if(
                !video.srcObject
                &&
                !currentCall
                ){
        
                    connect();
        
                }
        
        
            },5000);
        
        
        }
        // ==============================
        // 麦克风控制
        // ==============================
        
        function toggleMic(){
        
            if(!localStream){
                return;
            }
        
        
            mic=!mic;
        
        
            localStream
            .getAudioTracks()
            .forEach(track=>{
        
                track.enabled=mic;
        
            });
        
        
        
            const btn=
            document.getElementById("mic");
        
        
            if(mic){
        
                btn.innerHTML=
                "麦克风: 开启";
        
                btn.classList.remove("red");
        
        
            }else{
        
                btn.innerHTML=
                "麦克风: 关闭";
        
                btn.classList.add("red");
        
            }
        
        }
        
        
        
        
        // ==============================
        // 网络状态检测
        // ==============================
        
        
        window.addEventListener(
        "online",
        ()=>{
        
            live.innerHTML=
            "网络恢复，尝试重新连接";
        
        
        });
        
        
        
        window.addEventListener(
        "offline",
        ()=>{
        
            live.innerHTML=
            "⚠️ 网络断开";
        
        });
        
        
        
        
        // ==============================
        // 页面关闭清理
        // ==============================
        
        
        window.addEventListener(
        "beforeunload",
        ()=>{
        
        
            if(localStream){
        
        
                localStream
                .getTracks()
                .forEach(
                track=>track.stop()
                );
        
        
            }
        
        
        
            if(peer){
        
                peer.destroy();
        
            }
        
        
        });
        
        
        
        
        // ==============================
        // 视频异常恢复
        // ==============================
        
        
        setInterval(()=>{
        
        
            if(video){
        
                if(video.readyState===0){
        
                    live.innerHTML=
                    "等待视频流...";
        
                }
        
            }
        
        
        },10000);
        
        
        
        // ==============================
        // Peer连接状态显示
        // ==============================
        
        
        if(peer){
        
        
        peer.on(
        "disconnected",
        ()=>{
        
        
            live.innerHTML=
            "服务器断开，重新连接";
        
        
            peer.reconnect();
        
        
        });
        
        
        
        peer.on(
        "close",
        ()=>{
        
        
            live.innerHTML=
            "连接关闭";
        
        
        });
        
        
        }
        
    </script>


</body>

</html>
