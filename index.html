<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简P2P监控</title>
    <!-- 引入 PeerJS 核心库 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #007bff; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #333; color: #fff; }
        button { background: #007bff; color: white; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        .btn-mute { background: #6c757d; }
        .btn-mute.active { background: #dc3545; }
        video { width: 100%; border-radius: 10px; background: #333; margin-top: 15px; }
        #status { font-size: 12px; color: #888; text-align: center; margin-top: 5px; }
        .controls { display: none; } /* 初始隐藏控制按钮 */
    </style>
</head>

<body>

    <div class="container">
        <h2>智能监控系统</h2>

        <div id="setupView">
            <input type="text" id="roomId" placeholder="输入房间号 (如: 123)" value="123">
            <select id="role">
                <option value="camera">我是：摄像头 (旧手机)</option>
                <option value="tv">我是：电视机 (显示器)</option>
            </select>
            <button onclick="init()">开始连接</button>
        </div>

        <div id="activeView" style="display:none;">
            <div id="status">正在准备网络...</div>
            <!-- 重要：playsinline 和 muted 保证自动播放 -->
            <video id="mainVideo" autoplay playsinline muted></video>

            <div id="cameraControls" class="controls">
                <button id="muteBtn" class="btn-mute" onclick="toggleMic()">麦克风：开启中</button>
                <button onclick="location.reload()">退出房间</button>
            </div>

            <div id="tvControls" class="controls">
                <button onclick="location.reload()">重新连接</button>
                <p style="font-size: 12px; color: #666;">* 如果没有画面，请确保摄像头端已开启</p>
            </div>
        </div>
    </div>

    <script>
        let peer = null;
        let localStream = null;
        let isMuted = false;
        
        async function init() {
            const roomId = document.getElementById('roomId').value;
            const role = document.getElementById('role').value;
            if (!roomId) return alert("请输入房间号");
        
            // 切换 UI
            document.getElementById('setupView').style.display = 'none';
            document.getElementById('activeView').style.display = 'block';
            
            // 1. 初始化 Peer (使用公共服务器)
            const myId = role === 'camera' ? `room-${roomId}-cam` : `room-${roomId}-tv-${Math.floor(Math.random()*1000)}`;
            peer = new Peer(myId);
        
            peer.on('open', (id) => {
                document.getElementById('status').innerText = "网络在线，ID: " + roomId;
                if (role === 'camera') {
                    document.getElementById('cameraControls').style.display = 'block';
                    startCamera();
                } else {
                    document.getElementById('tvControls').style.display = 'block';
                    connectToCamera(roomId);
                }
            });
        
            peer.on('error', (err) => {
                document.getElementById('status').innerText = "连接失败: " + err.type;
                console.error(err);
            });
        }
        
        // --- 摄像头端逻辑 ---
        async function startCamera() {
            try {
                // 获取音视频流
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280, height: 720 }, 
                    audio: true 
                });
                document.getElementById('mainVideo').srcObject = localStream;
                document.getElementById('status').innerText = "监控运行中，等待电视接入...";
        
                // 当有电视呼叫时
                peer.on('call', (call) => {
                    console.log("收到电视连接请求");
                    call.answer(localStream); // 将自己的画面发给电视
                });
            } catch (e) {
                alert("权限错误: 请确保开启了摄像头和麦克风权限");
                document.getElementById('status').innerText = "错误: " + e.message;
            }
        }
        
        // --- 电视机端逻辑 ---
        function connectToCamera(roomId) {
            const targetId = `room-${roomId}-cam`;
            document.getElementById('status').innerText = "正在寻找摄像头...";
        
            // 电视端不需要自己的流，传一个假的占位
            const call = peer.call(targetId, new MediaStream());
        
            call.on('stream', (remoteStream) => {
                console.log("成功接收到画面");
                document.getElementById('status').innerText = "画面已同步";
                const video = document.getElementById('mainVideo');
                video.srcObject = remoteStream;
                video.muted = false; // 接收到流后，电视端尝试开启声音
            });
        }
        
        // --- 功能控制 ---
        function toggleMic() {
            if (localStream) {
                isMuted = !isMuted;
                // 找到音频轨道并禁用/启用
                localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
                
                const btn = document.getElementById('muteBtn');
                if (isMuted) {
                    btn.innerText = "麦克风：已关闭";
                    btn.classList.add('active');
                } else {
                    btn.innerText = "麦克风：开启中";
                    btn.classList.remove('active');
                }
            }
        }
    </script>
</body>

</html>
