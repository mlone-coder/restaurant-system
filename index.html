<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能监控 - 稳定版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        .status-box { font-size: 13px; padding: 10px; border-radius: 5px; background: #2c2c2c; color: #ffeb3b; margin: 10px 0; text-align: center; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; }
        .hidden { display: none; }
        .mic-off { background: #dc3545 !important; }
    </style>
</head>

<body>

    <div class="card" id="setup-ui">
        <h2 style="text-align:center; margin-top:0;">监控设置</h2>
        <div class="status-box" id="info">请设置房间并进入</div>
        <input type="number" id="roomId" placeholder="输入房间数字 (例如: 123)" value="123">
        <select id="role">
            <option value="camera">【角色】摄像头 (放房间)</option>
            <option value="tv">【角色】电视机 (看画面)</option>
        </select>
        <button id="startBtn" onclick="start()">进入房间</button>
    </div>

    <div id="video-ui" class="hidden" style="width: 100%; max-width: 500px;">
        <div class="status-box" id="live-status">正在连接网络...</div>
        <video id="videoDisplay" autoplay playsinline></video>
        <div style="display:flex; gap: 10px; margin-top: 10px;">
            <button id="micBtn" onclick="toggleMic()">麦克风: 开启</button>
            <button style="background:#555;" onclick="location.reload()">退出</button>
        </div>
        <p id="tips" style="font-size:12px; color:#888; text-align:center;"></p>
    </div>

    <script>
        let peer = null;
        let localStream = null;
        let isMicEnabled = true;
        
        const info = document.getElementById('info');
        const liveStatus = document.getElementById('live-status');
        const videoElem = document.getElementById('videoDisplay');
        
        async function start() {
            const roomId = document.getElementById('roomId').value;
            const role = document.getElementById('role').value;
            if (!roomId) return alert("请输入房间号");
        
            document.getElementById('setup-ui').classList.add('hidden');
            document.getElementById('video-ui').classList.remove('hidden');
        
            // 1. 创建 Peer 对象
            // 摄像头 ID 设为固定格式，电视机随机 ID
            const myId = (role === 'camera') ? `cam-${roomId}` : `tv-${roomId}-${Math.floor(Math.random()*999)}`;
            
            peer = new Peer(myId, {
                debug: 1,
                config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
            });
        
            peer.on('open', (id) => {
                liveStatus.innerText = "网络已连接，房间号：" + roomId;
                if (role === 'camera') {
                    initCamera();
                } else {
                    initTV(roomId);
                }
            });
        
            peer.on('error', (err) => {
                console.error("PeerJS Error:", err.type);
                if (err.type === 'peer-unavailable') {
                    liveStatus.innerText = "找不到摄像头，正在循环尝试...";
                } else if (err.type === 'unavailable-id') {
                    alert("该房间号已被占用，请刷新更换一个");
                    location.reload();
                } else {
                    liveStatus.innerText = "错误: " + err.type;
                }
            });
        }
        
        // --- 摄像头逻辑 ---
        async function initCamera() {
            try {
                liveStatus.innerText = "正在开启摄像头...";
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: true
                });
                videoElem.srcObject = localStream;
                videoElem.muted = true; // 摄像头端静音，防止回音
                liveStatus.innerText = "监控中：等待电视机连接...";
                document.getElementById('tips').innerText = "提示：请在另一台手机选“电视机”并输入相同房间号";
        
                // 响应呼叫
                peer.on('call', (call) => {
                    liveStatus.innerText = "电视机已接入";
                    call.answer(localStream);
                });
            } catch (e) {
                alert("无法调用摄像头，请确保使用 HTTPS 或 localhost 访问，并授予权限");
                liveStatus.innerText = "错误: 权限被拒绝";
            }
        }
        
        // --- 电视机逻辑 ---
        function initTV(roomId) {
            const targetCamId = `cam-${roomId}`;
            liveStatus.innerText = "正在寻找摄像头...";
            document.getElementById('tips').innerText = "提示：若画面未出现，请确保摄像头端已开启并点一下屏幕";
            document.getElementById('micBtn').classList.add('hidden'); // 电视端不需要麦克风按钮
        
            // 循环尝试连接，直到成功
            const tryConnect = () => {
                console.log("尝试呼叫:", targetCamId);
                // 电视端呼叫时发送一个空的流
                const call = peer.call(targetCamId, new MediaStream());
                
                call.on('stream', (remoteStream) => {
                    liveStatus.innerText = "连接成功！";
                    videoElem.srcObject = remoteStream;
                    videoElem.muted = false;
                    videoElem.play();
                });
            };
        
            // 初始呼叫
            tryConnect();
        
            // 每 5 秒重试一次，直到 videoElem 有了流
            const retryInterval = setInterval(() => {
                if (videoElem.srcObject) {
                    clearInterval(retryInterval);
                } else {
                    tryConnect();
                }
            }, 5000);
        }
        
        // --- 麦克风控制 ---
        function toggleMic() {
            if (localStream) {
                isMicEnabled = !isMicEnabled;
                localStream.getAudioTracks().forEach(track => track.enabled = isMicEnabled);
                const btn = document.getElementById('micBtn');
                btn.innerText = isMicEnabled ? "麦克风: 开启" : "麦克风: 已关";
                btn.classList.toggle('mic-off', !isMicEnabled);
            }
        }
    </script>
</body>

</html>
